<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>Task Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding-bottom: 80px; }
.header { background: #fff; border-bottom: 1px solid #e8e8e3; padding: 14px 16px 10px; position: sticky; top: 0; z-index: 50; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.app-title { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.1em; text-transform: uppercase; }
.date-nav { display: flex; align-items: center; gap: 8px; }
.nav-btn { background: #fff; border: 1px solid #ddd; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: #666; }
.date-label { font-size: 20px; font-weight: 600; color: #111; }
.date-sub { font-size: 11px; color: #aaa; margin-top: 1px; }
.view-toggle { display: flex; gap: 4px; background: #f0f0ea; border-radius: 8px; padding: 3px; margin-top: 8px; }
.view-toggle div { flex: 1; text-align: center; padding: 6px; font-size: 12px; border-radius: 6px; cursor: pointer; color: #666; font-weight: 500; }
.view-toggle div.active { background: #fff; color: #111; }
.sync-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.sync-msg { font-size: 11px; color: #aaa; }
.reload-btn { font-size: 11px; color: #666; background: #f5f5f0; border: 1px solid #ddd; border-radius: 5px; padding: 3px 10px; cursor: pointer; }
.progress-wrap { background: #fff; border-bottom: 1px solid #e8e8e3; padding: 8px 16px 12px; }
.progress-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
.progress-txt { font-size: 12px; color: #888; }
.progress-pct { font-size: 12px; font-weight: 600; color: #111; }
.pbar-bg { height: 3px; background: #eee; border-radius: 99px; }
.pbar-fill { height: 3px; background: #1D9E75; border-radius: 99px; transition: width 0.3s; }
.content { padding: 12px 16px; }
.section-header { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #bbb; margin: 14px 0 6px; }
.section-header:first-child { margin-top: 0; }
.task-card { background: #fff; border: 1px solid #e8e8e3; border-radius: 12px; margin-bottom: 6px; overflow: hidden; transition: opacity 0.2s; }
.task-card.done { opacity: 0.4; }
.task-card.cancelled { opacity: 0.35; }
.task-card.apt { border-left: 3px solid #E6A817; }
.task-row { display: flex; align-items: center; gap: 10px; padding: 12px; cursor: pointer; user-select: none; }
.task-row:active { background: #f9f9f6; }
.check-box { width: 20px; height: 20px; min-width: 20px; border: 2px solid #ccc; border-radius: 5px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.check-box.checked { background: #1D9E75; border-color: #1D9E75; }
.check-box.checked::after { content: '\2713'; font-size: 12px; color: white; font-weight: 700; }
.check-box.cancelled-box { background: #f5f5f0; border-color: #ccc; }
.check-box.cancelled-box::after { content: '\2014'; font-size: 11px; color: #aaa; }
.task-info { flex: 1; min-width: 0; }
.task-name { font-size: 14px; color: #111; }
.task-meta-row { display: flex; align-items: center; gap: 5px; margin-top: 3px; flex-wrap: wrap; }
.task-time-lbl { font-size: 11px; color: #aaa; }
.task-cadence { font-size: 11px; color: #aaa; font-style: italic; margin-top: 2px; }
.badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 600; }
.badge-med { background: #EEEDFE; color: #3C3489; }
.badge-health { background: #E1F5EE; color: #085041; }
.badge-other { background: #F1EFE8; color: #555; }
.badge-checkin { background: #E6F1FB; color: #0C447C; }
.badge-apt { background: #FEF3E2; color: #7A4F00; }
.badge-work { background: #E8F4FD; color: #0C447C; }
.expand-arrow { font-size: 11px; color: #ccc; transition: transform 0.2s; }
.expand-arrow.open { transform: rotate(180deg); }
.task-expanded { border-top: 1px solid #f0f0ea; padding: 10px 12px; background: #fafaf7; }
.task-note-text { font-size: 12px; color: #777; line-height: 1.4; }
.notes-section { margin-bottom: 8px; }
.notes-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #bbb; margin-bottom: 4px; }
.task-note-entry { font-size: 12px; color: #555; background: #f0f0ea; border-radius: 6px; padding: 5px 8px; margin-bottom: 3px; line-height: 1.4; }
.note-add-row { display: flex; gap: 6px; margin-top: 6px; align-items: center; }
.note-input { flex: 1; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: #fff; color: #111; outline: none; min-width: 0; }
.write-status { font-size: 11px; color: #aaa; margin-top: 4px; }
.action-row { display: flex; gap: 6px; flex-wrap: wrap; }
.action-btn { font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 500; border: none; }
.action-btn.primary { color: #085041; background: #E1F5EE; }
.action-btn.danger { color: #A32D2D; background: #FCEBEB; }
.action-btn.muted { color: #555; background: #f0f0ea; }
.action-btn.freeroll { color: #7A4F00; background: #FEF3E2; }
.confirm-cancel-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; padding: 8px 10px; background: #FCEBEB; border-radius: 8px; }
.checkin-body { border-top: 1px solid #f0f0ea; padding: 12px 14px; background: #fafaf7; }
.q-block { margin-bottom: 14px; }
.q-label { font-size: 13px; color: #555; margin-bottom: 6px; }
.scale-row { display: flex; gap: 4px; flex-wrap: wrap; }
.scale-btn { width: 32px; height: 30px; border: 1px solid #e0e0da; border-radius: 6px; font-size: 12px; background: #fff; color: #333; cursor: pointer; font-weight: 500; }
.scale-btn.sel { background: #1D9E75; color: white; border-color: #1D9E75; }
.bool-row { display: flex; gap: 8px; }
.bool-btn { padding: 6px 20px; border-radius: 8px; border: 1px solid #e0e0da; background: #fff; font-size: 13px; color: #333; cursor: pointer; }
.bool-btn.sel-y { background: #E1F5EE; color: #085041; border-color: #5DCAA5; }
.bool-btn.sel-n { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
.submit-checkin { width: 100%; padding: 10px; background: #1D9E75; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; }
.ci-status { font-size: 11px; color: #888; text-align: center; margin-top: 6px; }
.fab { position: fixed; bottom: 24px; right: 20px; width: 48px; height: 48px; background: #fff; border: 1px solid #ddd; border-radius: 14px; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #333; z-index: 100; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px 16px 0 0; padding: 20px 20px 36px; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #111; }
.field { margin-bottom: 12px; }
.field label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; font-weight: 500; }
.field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; color: #111; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-disabled { opacity: 0.4; pointer-events: none; }
.day-btns { display: flex; gap: 4px; flex-wrap: wrap; }
.day-btn { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; background: #fff; color: #666; cursor: pointer; min-width: 38px; text-align: center; }
.day-btn.sel { background: #1D9E75; color: white; border-color: #1D9E75; }
.req { color: #A32D2D; }
.checkbox-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
.checkbox-row input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; }
.checkbox-row label { font-size: 13px; color: #444; cursor: pointer; margin: 0; font-weight: 400; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.btn-cancel-m { background: #f5f5f0; border: none; border-radius: 8px; padding: 8px 18px; cursor: pointer; color: #666; font-size: 14px; }
.btn-save-m { background: #1D9E75; border: none; border-radius: 8px; padding: 8px 18px; cursor: pointer; color: white; font-size: 14px; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="app-title">Task Tracker</span>
    <div class="date-nav" id="date-nav">
      <button class="nav-btn" onclick="changeDay(-1)">&#8249;</button>
      <span class="date-label" id="date-label">Today</span>
      <button class="nav-btn" onclick="changeDay(1)">&#8250;</button>
    </div>
  </div>
  <div class="date-sub" id="date-sub"></div>
  <div class="view-toggle">
    <div id="tab-today" class="active" onclick="setView('today')">Today</div>
    <div id="tab-upcoming" onclick="setView('upcoming')">Upcoming</div>
  </div>
  <div class="sync-row">
    <span class="sync-msg" id="sync-msg">Loading...</span>
    <button class="reload-btn" onclick="loadAll()">Reload</button>
  </div>
</div>

<div class="progress-wrap" id="progress-wrap">
  <div class="progress-row">
    <span class="progress-txt" id="prog-txt">0 of 0 tasks complete</span>
    <span class="progress-pct" id="prog-pct">0%</span>
  </div>
  <div class="pbar-bg"><div class="pbar-fill" id="pbar" style="width:0%"></div></div>
</div>

<div class="content" id="task-list"></div>
<button class="fab" onclick="openModal()">+</button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Add task</h3>
    <div class="field">
      <label>Task name <span class="req">*</span></label>
      <input type="text" id="new-name" placeholder="e.g. Clean refrigerator">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Category <span class="req">*</span></label>
        <select id="new-cat" onchange="onCategoryChange()">
          <option value="Other" selected>Other</option>
          <option value="Health">Health</option>
          <option value="Med">Med</option>
          <option value="Work">Work</option>
          <option value="Checkin">Checkin</option>
          <option value="Apt Medical">Apt Medical</option>
          <option value="Apt Other">Apt Other</option>
        </select>
      </div>
      <div class="field">
        <label>Type <span class="req">*</span></label>
        <select id="new-type">
          <option value="Flexible" selected>Flexible</option>
          <option value="Time-sensitive">Time-sensitive</option>
          <option value="Med">Med</option>
          <option value="Free-roll">Free-roll</option>
          <option value="Check-in">Check-in</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Time (optional)</label>
        <input type="text" id="new-time" placeholder="e.g. 9:00 AM">
      </div>
      <div class="field">
        <label>Repeat <span class="req">*</span></label>
        <select id="new-repeat" onchange="updateModalFields()">
          <option value="Daily">Daily</option>
          <option value="Weekly">Weekly</option>
          <option value="One-time" selected>One-time</option>
          <option value="Self-Contingent">Self-Contingent</option>
        </select>
      </div>
    </div>
    <div class="field" id="days-field">
      <label>Days of week</label>
      <div class="day-btns">
        <button type="button" class="day-btn" data-day="Sunday" onclick="toggleDay(this)">Su</button>
        <button type="button" class="day-btn" data-day="Monday" onclick="toggleDay(this)">Mo</button>
        <button type="button" class="day-btn" data-day="Tuesday" onclick="toggleDay(this)">Tu</button>
        <button type="button" class="day-btn" data-day="Wednesday" onclick="toggleDay(this)">We</button>
        <button type="button" class="day-btn" data-day="Thursday" onclick="toggleDay(this)">Th</button>
        <button type="button" class="day-btn" data-day="Friday" onclick="toggleDay(this)">Fr</button>
        <button type="button" class="day-btn" data-day="Saturday" onclick="toggleDay(this)">Sa</button>
      </div>
    </div>
    <div class="field" id="freq-field">
      <label>Frequency</label>
      <select id="new-freq">
        <option value="1" selected>Every week</option>
        <option value="2">Every 2 weeks</option>
        <option value="3">Every 3 weeks</option>
        <option value="4">Every 4 weeks</option>
      </select>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Start date <span class="req">*</span></label>
        <input type="date" id="new-start">
      </div>
      <div class="field">
        <label>End date (optional)</label>
        <input type="date" id="new-end">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Rollover <span class="req">*</span></label>
        <select id="new-rollover">
          <option value="TRUE" selected>Yes</option>
          <option value="FALSE">No</option>
        </select>
      </div>
      <div class="field">
        <label>Reminder (min before)</label>
        <input type="number" id="new-reminder" placeholder="e.g. 30">
      </div>
    </div>
    <div class="field">
      <label>Instructions (optional)</label>
      <input type="text" id="new-notes" placeholder="e.g. Take with food">
    </div>
    <div class="field-row" id="contingent-delay-fields" style="display:none">
      <div class="field">
        <label>Delay</label>
        <input type="number" id="new-contingent-delay" placeholder="e.g. 21">
      </div>
      <div class="field">
        <label>Unit</label>
        <select id="new-contingent-unit">
          <option value="Days" selected>Days</option>
          <option value="Hours">Hours</option>
          <option value="Minutes">Minutes</option>
        </select>
      </div>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="new-calendar">
      <label for="new-calendar">Add to Google Calendar</label>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
      <button class="btn-save-m" id="modal-save-btn" onclick="saveNewTask()">Add</button>
    </div>
  </div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwbxtLqIOT17tzeKTY9GNIiWqKgRgKiJD8CY54oWB5BBCCoEdszaICT75vDqJbRzRprxA/exec';
var DAY_NAMES  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var DAY_SHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function toLocalDateStr(d) {
  return d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
}

var offsetDays=0, expanded={}, completions={}, checkinAnswers={}, checkinSubmitted={}, writeStatuses={}, pendingCancel={};
var editingTaskId=null;
var taskNotes={}, notesLoading={}, noteInputs={};
var completionTimes={}; // taskId → Date object of when task was completed
var TASKS=[], questions=[], rules=[];
var viewMode='today', selectedDays=[];
var CHECKIN_TASK_PERIOD = {'TASK_001':'morning','TASK_002':'midday','TASK_003':'evening'};

function isAptCategory(cat) { return cat && cat.toLowerCase().indexOf('apt') > -1; }
function isMedCategory(cat) { return cat === 'Med'; }
function requiresConfirmToCancel(task) {
  return isAptCategory(task.category) || isMedCategory(task.category) || task.type === 'Med';
}

function callSheet(payload) {
  return fetch(SCRIPT_URL + '?payload=' + encodeURIComponent(JSON.stringify(payload)))
    .then(function(r){return r.json();}).catch(function(){return {success:false};});
}

function loadAll() {
  document.getElementById('sync-msg').textContent='Loading...';
  var today=toLocalDateStr(getViewDate());
  Promise.all([
    callSheet({action:'getTasks'}),
    callSheet({action:'getRules'}),
    callSheet({action:'getQuestions'}),
    callSheet({action:'getCompletions',date:today})
  ]).then(function(results){
    if (results[0].success) TASKS=results[0].tasks;
    if (results[1].success) rules=results[1].rules;
    if (results[2].success) questions=results[2].questions;
    if (results[3].success) completions=results[3].completions;
    document.getElementById('sync-msg').textContent='Ready';
    render();
  }).catch(function(){
    document.getElementById('sync-msg').textContent='Offline';
    render();
  });
}

function getViewDate(){var d=new Date();d.setDate(d.getDate()+offsetDays);d.setHours(12,0,0,0);return d;}

function updateDateDisplay(){
  var d=getViewDate(),dayName=DAY_NAMES[d.getDay()];
  var label=offsetDays===0?'Today':offsetDays===-1?'Yesterday':offsetDays===1?'Tomorrow':dayName;
  document.getElementById('date-label').textContent=label;
  document.getElementById('date-sub').textContent=dayName+', '+MONTHS[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
}

function changeDay(dir){offsetDays+=dir;loadAll();}

function setView(mode){
  viewMode=mode;
  document.getElementById('tab-today').classList.toggle('active',mode==='today');
  document.getElementById('tab-upcoming').classList.toggle('active',mode==='upcoming');
  document.getElementById('date-nav').style.display=mode==='today'?'flex':'none';
  document.getElementById('progress-wrap').style.display=mode==='today'?'block':'none';
  render();
}

function parseDate(val){
  if (!val) return null;
  if (val instanceof Date) return val;
  if (String(val).indexOf('/')>-1){var p=String(val).split('/');return new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]),12);}
  return new Date(val+'T12:00:00');
}

function isInDateRange(t,d){
  if (t.start_date){var s=parseDate(t.start_date);if(s&&d<s)return false;}
  if (t.end_date){var e=parseDate(t.end_date);if(e&&d>e)return false;}
  return true;
}

function isTaskOnDay(t,d){
  if (!isInDateRange(t,d)) return false;
  var dayName=DAY_NAMES[d.getDay()];
  if (t.repeat==='Daily') return true;
  if (t.repeat==='Weekly'){
    var days=t.days.split(',').map(function(s){return s.trim();});
    if (days.indexOf(dayName)===-1) return false;
    if (!t.freq||t.freq<=1) return true;
    var start=parseDate(t.start_date);
    if (!start) return true;
    var weeksDiff=Math.floor((d-start)/(7*24*60*60*1000));
    return weeksDiff%t.freq===0;
  }
  if (t.repeat==='One-time'){var sd=parseDate(t.start_date);return sd&&sd.toDateString()===d.toDateString();}
  if (t.repeat==='Self-Contingent'){var sc=parseDate(t.start_date);return !sc||d>=sc;}
  return false;
}

function isContingentVisible(t){
  if (!t.contingent_on) return true;
  if (t.contingent_on === 'SELF') return true; // Self-Contingent always visible
  return completions[t.contingent_on]==='done';
}

// Calculate display time for a contingent task based on parent completion time + delay
function getContingentTime(t){
  if (!t.contingent_on || t.contingent_on === 'SELF') return t.time;
  var parentCompleteTime = completionTimes[t.contingent_on];
  if (!parentCompleteTime) return t.time;
  var delay = parseInt(t.contingent_delay) || 0;
  var unit = (t.contingent_delay_unit || 'Minutes').toLowerCase();
  var ms = 0;
  if (unit === 'minutes') ms = delay * 60 * 1000;
  else if (unit === 'hours') ms = delay * 60 * 60 * 1000;
  else if (unit === 'days') ms = delay * 24 * 60 * 60 * 1000;
  var displayTime = new Date(parentCompleteTime.getTime() + ms);
  var h = displayTime.getHours(), mn = displayTime.getMinutes();
  var meridiem = h >= 12 ? 'PM' : 'AM';
  var displayH = h % 12 || 12;
  return displayH + ':' + (mn < 10 ? '0'+mn : mn) + ' ' + meridiem;
}

function todayTasks(){
  var d=getViewDate();
  return TASKS.filter(function(t){return isTaskOnDay(t,d)&&isContingentVisible(t);});
}

function nextOccurrence(t,fromDate){
  for (var i=0;i<365;i++){var d=new Date(fromDate);d.setDate(d.getDate()+i);if(isTaskOnDay(t,d))return d;}
  return null;
}

function getPeriodForTask(taskId){return CHECKIN_TASK_PERIOD[taskId]||'morning';}

function badgeClass(cat,type){
  if (type==='Check-in') return 'badge-checkin';
  if (isAptCategory(cat)) return 'badge-apt';
  if (cat==='Med') return 'badge-med';
  if (cat==='Health') return 'badge-health';
  if (cat==='Work') return 'badge-work';
  return 'badge-other';
}

// ── TIME FORMAT ───────────────────────────────────────────────
// Handles: "9:00 AM", "9:00 PM", "9:00" (assumes AM if h<12)
function toMin(s){
  if (!s || !s.trim()) return 9999;
  var m = s.match(/(\d+):(\d+)\s*(AM|PM)?/i);
  if (!m) return 9999;
  var h=parseInt(m[1]), mn=parseInt(m[2]);
  var meridiem = m[3] ? m[3].toUpperCase() : (h < 12 ? 'AM' : 'PM');
  if (meridiem==='PM' && h!==12) h+=12;
  if (meridiem==='AM' && h===12) h=0;
  return h*60+mn;
}

// Normalize time to H:MM AM/PM format
function normalizeTime(s){
  if (!s || !s.trim()) return '';
  var m = s.match(/(\d+):(\d+)\s*(AM|PM)?/i);
  if (!m) return s;
  var h=parseInt(m[1]), mn=parseInt(m[2]);
  var meridiem = m[3] ? m[3].toUpperCase() : (h < 12 ? 'AM' : 'PM');
  if (meridiem==='PM' && h!==12) h+=12;
  if (meridiem==='AM' && h===12) h=0;
  var displayH = h % 12 || 12;
  var displayM = meridiem==='PM' ? (h>=12?'PM':'AM') : 'AM';
  // recalc meridiem from 24h
  displayM = h >= 12 ? 'PM' : 'AM';
  displayH = h % 12 || 12;
  return displayH + ':' + (mn < 10 ? '0'+mn : mn) + ' ' + displayM;
}

function fmtDate(d){return DAY_SHORT[d.getDay()]+' '+MONTHS[d.getMonth()]+' '+d.getDate();}

function cadenceText(t){
  if (t.repeat==='Daily') return 'Daily';
  if (t.repeat==='Weekly'){
    var days=t.days.split(',').map(function(s){return s.trim().substring(0,3);}).join('/');
    var prefix=(!t.freq||t.freq<=1)?'Weekly':'Every '+t.freq+' weeks';
    return prefix+' on '+days;
  }
  if (t.repeat==='One-time') return 'One-time';
  if (t.repeat==='Self-Contingent') return (t.instructions?t.instructions+' — ':'')+'after completion';
  return '';
}

function render(){
  updateDateDisplay();
  if (viewMode==='today') renderToday();
  else renderUpcoming();
}

function getEffectiveTime(t){
  // For contingent tasks with a delay, use calculated time; otherwise use scheduled_time
  if (t.contingent_on && t.contingent_on !== 'SELF' && completionTimes[t.contingent_on]) {
    return getContingentTime(t);
  }
  return t.time || '';
}

function doneOrder(t){var s=completions[t.id];return(s==='done'||s==='cancelled')?1:0;}

function renderToday(){
  var allTasks=todayTasks();
  var isDone=function(t){var s=completions[t.id];return s==='done'||s==='cancelled';};

  // Active tasks (incomplete): scheduled by time, then anytime
  var activeScheduled=allTasks.filter(function(t){return !isDone(t)&&getEffectiveTime(t).trim()!=='';})
    .sort(function(a,b){return toMin(getEffectiveTime(a))-toMin(getEffectiveTime(b));});
  var activeAnytime=allTasks.filter(function(t){return !isDone(t)&&getEffectiveTime(t).trim()==='';});

  // Done tasks (completed/cancelled): sorted by original scheduled_time
  var doneTasks=allTasks.filter(isDone)
    .sort(function(a,b){
      var at=a.time?toMin(a.time):9999, bt=b.time?toMin(b.time):9999;
      return at-bt;
    });

  // Progress bar: only tasks with counts_toward_rate=TRUE
  // Free-roll = done visually but counted_in_rate=FALSE, so excluded from total
  var total=0, done=0;
  allTasks.forEach(function(t){
    if (t.type==='Check-in') return;
    if (t.type==='Free-roll') return;
    if (t.counts_toward_rate===false) return;
    total++;
    if (completions[t.id]==='done') done++;
  });

  var pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-txt').textContent=done+' of '+total+' tasks complete';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('pbar').style.width=pct+'%';

  var html='';
  if (activeScheduled.length){html+='<div class="section-header">Scheduled</div>';activeScheduled.forEach(function(t){html+=renderTask(t);});}
  if (activeAnytime.length){html+='<div class="section-header">Anytime</div>';activeAnytime.forEach(function(t){html+=renderTask(t);});}
  if (!activeScheduled.length&&!activeAnytime.length&&!doneTasks.length) html='<div style="text-align:center;color:#aaa;font-size:13px;padding:30px">No tasks today</div>';
  if (doneTasks.length){html+='<div class="section-header">Done</div>';doneTasks.forEach(function(t){html+=renderTask(t);});}
  document.getElementById('task-list').innerHTML=html;
}

function renderUpcoming(){
  var today=new Date();today.setHours(0,0,0,0);
  var weekEnd=new Date(today);weekEnd.setDate(weekEnd.getDate()+7);
  var weekTasks=[],laterTasks=[],dailyTasks=[];
  TASKS.forEach(function(t){
    if (t.repeat==='Daily'){if(isInDateRange(t,today))dailyTasks.push({task:t,next:today});return;}
    var next=nextOccurrence(t,today);
    if (!next) return;
    if (next<=weekEnd) weekTasks.push({task:t,next:next});
    else laterTasks.push({task:t,next:next});
  });
  weekTasks.sort(function(a,b){return a.next-b.next;});
  laterTasks.sort(function(a,b){return a.next-b.next;});
  var html='';
  if (weekTasks.length){html+='<div class="section-header">This week</div>';weekTasks.forEach(function(i){html+=renderUpcomingTask(i.task,i.next);});}
  if (laterTasks.length){html+='<div class="section-header">Later</div>';laterTasks.forEach(function(i){html+=renderUpcomingTask(i.task,i.next);});}
  if (dailyTasks.length){html+='<div class="section-header">Daily (today)</div>';dailyTasks.forEach(function(i){html+=renderUpcomingTask(i.task,i.next);});}
  if (!html) html='<div style="text-align:center;color:#aaa;font-size:13px;padding:30px">No upcoming tasks</div>';
  document.getElementById('task-list').innerHTML=html;
}

function renderUpcomingTask(t,nextDate){
  var isCheckin=t.type==='Check-in';
  var aptClass=isAptCategory(t.category)?'apt':'';
  var isExp=expanded[t.id];
  var displayTime=normalizeTime(t.time);
  var meta='<span class="badge '+badgeClass(t.category,t.type)+'">'+(isCheckin?'Check-in':t.category)+'</span>';
  if (t.repeat!=='Daily'){var ds=fmtDate(nextDate);if(displayTime)ds+=', '+displayTime;meta+='<span class="task-time-lbl">'+ds+'</span>';}
  else if (displayTime){meta+='<span class="task-time-lbl">'+displayTime+'</span>';}
  var exp='';
  if (isExp){
    var instructionsHtml=t.instructions?'<div class="notes-section"><div class="notes-label">Instructions</div><div class="task-note-text">'+escapeHtml(t.instructions)+'</div></div>':'';
    exp='<div class="task-expanded">'+instructionsHtml+renderNotesSection(t.id)+'</div>';
  }
  return '<div class="task-card '+aptClass+'" id="card-'+t.id+'">'
    +'<div class="task-row" onclick="toggleExpand(\''+t.id+'\')">'
    +'<div class="check-box"></div>'
    +'<div class="task-info"><div class="task-name">'+t.name+'</div>'
    +'<div class="task-meta-row">'+meta+'</div>'
    +'<div class="task-cadence">'+cadenceText(t)+'</div></div>'
    +'<span class="expand-arrow '+(isExp?'open':'')+'">&#9660;</span>'
    +'</div>'+exp+'</div>';
}

function renderTask(t){
  var isCheckin=t.type==='Check-in',isDone=completions[t.id]==='done',isCancelled=completions[t.id]==='cancelled';
  var isExp=expanded[t.id],ws=writeStatuses[t.id]||'';
  var aptClass=isAptCategory(t.category)?'apt':'';
  var displayTime=t.contingent_on && t.contingent_on!=='SELF' ? getContingentTime(t) : normalizeTime(t.time);
  var meta='';
  if (displayTime) meta+='<span class="task-time-lbl">'+displayTime+'</span>';
  meta+='<span class="badge '+badgeClass(t.category,t.type)+'">'+(isCheckin?'Check-in':t.category)+'</span>';
  var exp='';
  if (isExp){
    if (isCheckin){exp=renderCheckinBody(t);}
    else{
      var instructionsHtml=t.instructions?'<div class="notes-section"><div class="notes-label">Instructions</div><div class="task-note-text">'+escapeHtml(t.instructions)+'</div></div>':'';
      var notesHtml=renderNotesSection(t.id);
      var cancelState = pendingCancel[t.id]; // undefined, 'prompt', 'confirm-series'
      var actionRow, confirmRow='';

      if (cancelState === 'prompt') {
        actionRow = '<div class="action-row">'
          +'<button class="action-btn primary" onclick="event.stopPropagation();markDone(\''+t.id+'\')">Done</button>'
          +'<button class="action-btn freeroll" onclick="event.stopPropagation();markFreeRoll(\''+t.id+'\')">Free-roll</button>'
          +'<button class="action-btn danger" onclick="event.stopPropagation();clearPendingCancel(\''+t.id+'\')">&#8249; Back</button>'
          +'</div>';
        confirmRow = '<div class="confirm-cancel-row">'
          +'<button class="action-btn danger" style="padding:6px 14px" onclick="event.stopPropagation();markCancelled(\''+t.id+'\')">Cancel Today</button>'
          +'<button class="action-btn muted" style="padding:6px 14px;color:#A32D2D" onclick="event.stopPropagation();promptCancelSeries(\''+t.id+'\')">Cancel Series</button>'
          +'</div>';
      } else if (cancelState === 'confirm-series') {
        actionRow = '<div class="action-row">'
          +'<button class="action-btn muted" onclick="event.stopPropagation();pendingCancel[\''+t.id+'\']=\'prompt\';render()">&#8249; Back</button>'
          +'</div>';
        confirmRow = '<div class="confirm-cancel-row">'
          +'<span style="font-size:12px;color:#A32D2D;width:100%">Cancel today + all future occurrences of "'+t.name+'"?</span>'
          +'<button class="action-btn danger" style="padding:6px 14px" onclick="event.stopPropagation();markCancelledSeries(\''+t.id+'\')">Yes, cancel series</button>'
          +'<button class="action-btn muted" style="padding:6px 14px" onclick="event.stopPropagation();clearPendingCancel(\''+t.id+'\')">No</button>'
          +'</div>';
      } else {
        actionRow = '<div class="action-row">'
          +'<button class="action-btn primary" onclick="event.stopPropagation();markDone(\''+t.id+'\')">Done</button>'
          +'<button class="action-btn freeroll" onclick="event.stopPropagation();markFreeRoll(\''+t.id+'\')">Free-roll</button>'
          +'<button class="action-btn danger" onclick="event.stopPropagation();confirmCancel(\''+t.id+'\')">Cancel</button>'
          +'<button class="action-btn muted" style="font-size:11px;padding:4px 10px;margin-left:auto" onclick="event.stopPropagation();openEditModal(\''+t.id+'\')">Edit</button>'
          +'</div>';
      }
      exp='<div class="task-expanded">'+instructionsHtml+notesHtml+actionRow+confirmRow
        +(ws?'<div class="write-status">'+ws+'</div>':'')
        +'</div>';
    }
  }
  return '<div class="task-card '+aptClass+(isDone?' done':isCancelled?' cancelled':'')+'" id="card-'+t.id+'">'
    +'<div class="task-row" onclick="toggleExpand(\''+t.id+'\')">'
    +'<div class="check-box '+(isDone?'checked':isCancelled?'cancelled-box':'')+'" onclick="event.stopPropagation();quickDone(\''+t.id+'\')"></div>'
    +'<div class="task-info"><div class="task-name">'+t.name+'</div><div class="task-meta-row">'+meta+'</div></div>'
    +'<span class="expand-arrow '+(isExp?'open':'')+'">&#9660;</span>'
    +'</div>'+exp+'</div>';
}

function renderCheckinBody(t){
  if (checkinSubmitted[t.id]) return '<div class="checkin-body"><div style="font-size:13px;color:#1D9E75;padding:6px 0">Check-in saved</div></div>';
  var period=getPeriodForTask(t.id);
  var qs=questions.filter(function(q){return q.period===period;});
  if (!qs.length) return '<div class="checkin-body"><div style="font-size:12px;color:#aaa;padding:6px 0">Loading questions...</div></div>';
  var html='<div class="checkin-body">';
  qs.forEach(function(q){
    var ans=checkinAnswers[q.question_id];
    html+='<div class="q-block"><div class="q-label">'+q.label+'</div>';
    if (q.type==='scale'){
      html+='<div class="scale-row">';
      for (var i=1;i<=10;i++) html+='<button class="scale-btn '+(ans==i?'sel':'')+'" onclick="event.stopPropagation();setCI(\''+q.question_id+'\','+i+',\''+t.id+'\')">'+i+'</button>';
      html+='</div>';
    } else {
      html+='<div class="bool-row">'
        +'<button class="bool-btn '+(ans==='yes'?'sel-y':'')+'" onclick="event.stopPropagation();setCI(\''+q.question_id+'\',\'yes\',\''+t.id+'\')">Yes</button>'
        +'<button class="bool-btn '+(ans==='no'?'sel-n':'')+'" onclick="event.stopPropagation();setCI(\''+q.question_id+'\',\'no\',\''+t.id+'\')">No</button>'
        +'</div>';
    }
    html+='</div>';
  });
  html+='<button class="submit-checkin" onclick="event.stopPropagation();submitCheckin(\''+t.id+'\')">Submit check-in</button>'
    +'<div class="ci-status" id="ci-status-'+t.id+'"></div></div>';
  return html;
}

function toggleExpand(id){
  expanded[id]=!expanded[id];
  if (expanded[id] && taskNotes[id]===undefined && !notesLoading[id]) loadTaskNotes(id);
  render();
}

function loadTaskNotes(id){
  notesLoading[id]=true;
  callSheet({action:'getTaskNotes',task_id:id}).then(function(r){
    notesLoading[id]=false;
    taskNotes[id]=r.success?r.notes:[];
    render();
  });
}

function escapeHtml(s){
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderNotesSection(id){
  var html='<div class="notes-section">';
  if (notesLoading[id]){
    html+='<div class="task-note-text" style="margin-bottom:6px">Loading notes...</div>';
  } else if (taskNotes[id] && taskNotes[id].length>0){
    html+='<div class="notes-label">Notes</div>';
    taskNotes[id].forEach(function(n){
      html+='<div class="task-note-entry">'+escapeHtml(n.note_text)+(n.created_at?' <span style="color:#bbb;font-size:10px">'+escapeHtml(n.created_at)+'</span>':'')+'</div>';
    });
  }
  html+='<div class="note-add-row">'
    +'<input type="text" class="note-input" id="note-input-'+id+'" placeholder="Add a note..." value="'+escapeHtml(noteInputs[id]||'')+'" '
    +'oninput="noteInputs[\''+id+'\']=this.value" '
    +'onkeydown="if(event.key===\'Enter\'){event.stopPropagation();addNote(\''+id+'\')}" '
    +'onclick="event.stopPropagation()">'
    +'<button class="action-btn muted" style="white-space:nowrap" onclick="event.stopPropagation();addNote(\''+id+'\')">Add Note</button>'
    +'</div>';
  html+='</div>';
  return html;
}

function addNote(id){
  var text=(noteInputs[id]||'').trim();
  if (!text) return;
  noteInputs[id]='';
  render(); // clear input immediately
  callSheet({action:'addTaskNote',task_id:id,note_text:text}).then(function(r){
    if (r.success){
      if (!taskNotes[id]) taskNotes[id]=[];
      taskNotes[id].push({note_id:r.note_id,note_text:text,created_at:''});
    }
    render();
  });
}

function quickDone(id){
  completions[id]=completions[id]==='done'?null:'done';
  if(completions[id]==='done'){completionTimes[id]=new Date();taskNotes[id]=undefined;noteInputs[id]='';sendToSheet(id,'Completed');}
  else{delete completionTimes[id];sendToSheet(id,'Uncompleted');}
  render();
}
function confirmCancel(id){
  pendingCancel[id]='prompt';
  expanded[id]=true;
  render();
}
function clearPendingCancel(id){pendingCancel[id]=null;render();}
function promptCancelSeries(id){pendingCancel[id]='confirm-series';render();}

function markCancelledSeries(id){
  var task=null;
  for (var i=0;i<TASKS.length;i++){if(TASKS[i].id===id){task=TASKS[i];break;}}
  completions[id]='cancelled';
  expanded[id]=false;
  pendingCancel[id]=null;
  // Log today as cancelled
  sendToSheet(id,'Cancelled');
  // Set end_date to today in sheet
  var today=toLocalDateStr(getViewDate());
  writeStatuses[id]='Cancelling series...';
  callSheet({action:'cancelSeries',task_id:id,end_date:today}).then(function(r){
    writeStatuses[id]=r.success?'Series cancelled':'Error cancelling series';
    // Remove from local TASKS so it doesn't reappear
    if (r.success) TASKS=TASKS.filter(function(t){return t.id!==id;});
    render();
  });
  render();
}

function markDone(id){completions[id]='done';completionTimes[id]=new Date();expanded[id]=false;pendingCancel[id]=null;taskNotes[id]=undefined;noteInputs[id]='';sendToSheet(id,'Completed');render();}
function markCancelled(id){completions[id]='cancelled';expanded[id]=false;pendingCancel[id]=null;sendToSheet(id,'Cancelled');render();}
function markFreeRoll(id){completions[id]='done';completionTimes[id]=new Date();expanded[id]=false;pendingCancel[id]=null;sendToSheet(id,'Free-rolled');render();}

function sendToSheet(taskId,status){
  var task=null;
  for (var i=0;i<TASKS.length;i++){if(TASKS[i].id===taskId){task=TASKS[i];break;}}
  if (!task) task={name:taskId,type:'Flexible',counts_toward_rate:true};

  // counted_in_rate logic:
  // Completed = TRUE (if task counts_toward_rate)
  // Free-rolled = FALSE always
  // Cancelled = FALSE always
  var countedInRate = false;
  if (status==='Completed') countedInRate = task.counts_toward_rate !== false && task.type !== 'Check-in' && task.type !== 'Free-roll';

  writeStatuses[taskId]='Saving...';render();
  callSheet({action:'logCompletion',task_id:taskId,task_name:task.name,task_type:task.type||'Flexible',
    scheduled_date:toLocalDateStr(getViewDate()),completed_at:new Date().toLocaleString('en-US'),
    status:status,counted_in_rate:countedInRate
  }).then(function(r){writeStatuses[taskId]=r.success?'Saved':'Saved locally';render();});
}

function setCI(qid,val,taskId){checkinAnswers[qid]=val;expanded[taskId]=true;render();}

function submitCheckin(taskId){
  var period=getPeriodForTask(taskId);
  var qs=questions.filter(function(q){return q.period===period;});
  var missing=qs.filter(function(q){return checkinAnswers[q.question_id]===undefined;});
  var statusEl=document.getElementById('ci-status-'+taskId);
  if (missing.length){if(statusEl)statusEl.textContent=missing.length+' question(s) remaining';return;}
  if (statusEl) statusEl.textContent='Saving...';
  var answers={};
  qs.forEach(function(q){answers[q.question_id]=checkinAnswers[q.question_id];});
  callSheet({action:'logCheckin',period:period,
    checkin_date:toLocalDateStr(getViewDate()),
    checkin_time:new Date().toLocaleTimeString('en-US'),answers:answers
  }).then(function(r){
    if (r.success){checkinSubmitted[taskId]=true;completions[taskId]='done';expanded[taskId]=false;sendToSheet(taskId,'Completed');}
    else if (statusEl) statusEl.textContent='Error saving';
    render();
  });
}

function onCategoryChange(){
  var cat=document.getElementById('new-cat').value;
  var isApt=isAptCategory(cat);
  document.getElementById('new-rollover').value=isApt?'FALSE':'TRUE';
  document.getElementById('new-calendar').checked=isApt;
  if (isApt){
    document.getElementById('new-type').value='Time-sensitive';
    if (!document.getElementById('new-reminder').value) document.getElementById('new-reminder').value='30';
  }
}

function updateModalFields(){
  var rep=document.getElementById('new-repeat').value;
  var isWeekly=rep==='Weekly';
  document.getElementById('days-field').classList.toggle('field-disabled',!isWeekly);
  document.getElementById('freq-field').classList.toggle('field-disabled',!isWeekly);
  document.getElementById('contingent-delay-fields').style.display=rep==='Self-Contingent'?'':'none';
}

function toggleDay(btn){
  var day=btn.dataset.day,i=selectedDays.indexOf(day);
  if (i>-1){selectedDays.splice(i,1);btn.classList.remove('sel');}
  else{selectedDays.push(day);btn.classList.add('sel');}
}

function openModal(){
  editingTaskId=null;
  document.getElementById('modal-title').textContent='Add task';
  document.getElementById('modal-save-btn').textContent='Add';
  var today=toLocalDateStr(new Date());
  document.getElementById('new-start').value=today;
  document.getElementById('new-end').value='';
  document.getElementById('new-name').value='';
  document.getElementById('new-time').value='';
  document.getElementById('new-notes').value='';
  document.getElementById('new-cat').value='Other';
  document.getElementById('new-type').value='Flexible';
  document.getElementById('new-repeat').value='One-time';
  document.getElementById('new-freq').value='1';
  document.getElementById('new-rollover').value='TRUE';
  document.getElementById('new-reminder').value='';
  document.getElementById('new-calendar').checked=false;
  document.getElementById('new-contingent-delay').value='';
  document.getElementById('new-contingent-unit').value='Days';
  selectedDays=[];
  document.querySelectorAll('.day-btn').forEach(function(b){b.classList.remove('sel');});
  updateModalFields();
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditModal(id){
  var t=TASKS.find(function(x){return x.id===id;});
  if (!t) return;
  editingTaskId=id;
  document.getElementById('modal-title').textContent='Edit task';
  document.getElementById('modal-save-btn').textContent='Save';
  document.getElementById('new-name').value=t.name;
  document.getElementById('new-cat').value=t.category||'Other';
  document.getElementById('new-type').value=t.type||'Flexible';
  document.getElementById('new-time').value=t.time||'';
  document.getElementById('new-repeat').value=t.repeat||'One-time';
  document.getElementById('new-freq').value=t.freq||1;
  document.getElementById('new-start').value=t.start_date||'';
  document.getElementById('new-end').value=t.end_date||'';
  document.getElementById('new-rollover').value=t.rollover?'TRUE':'FALSE';
  document.getElementById('new-reminder').value=t.reminder_minutes||'';
  document.getElementById('new-notes').value=t.instructions||'';
  document.getElementById('new-contingent-delay').value=t.contingent_delay||'';
  document.getElementById('new-contingent-unit').value=t.contingent_delay_unit||'Days';
  selectedDays=t.days?t.days.split(',').map(function(d){return d.trim();}):[];
  document.querySelectorAll('.day-btn').forEach(function(b){
    b.classList.toggle('sel',selectedDays.indexOf(b.dataset.day)>-1);
  });
  updateModalFields();
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

function saveNewTask(){
  var name=document.getElementById('new-name').value.trim();
  if (!name){alert('Task name required');return;}
  var rep=document.getElementById('new-repeat').value;
  if (rep==='Weekly'&&!selectedDays.length){alert('Pick at least one day');return;}
  var cat=document.getElementById('new-cat').value;
  var conOn=rep==='Self-Contingent'?'SELF':'';
  var payload={
    action:editingTaskId?'updateTask':'addTask',name:name,category:cat,
    type:document.getElementById('new-type').value,
    time:normalizeTime(document.getElementById('new-time').value.trim()),
    repeat:rep,days:selectedDays.join(', '),
    freq:parseInt(document.getElementById('new-freq').value)||1,
    start_date:document.getElementById('new-start').value,
    end_date:document.getElementById('new-end').value,
    rollover:document.getElementById('new-rollover').value,
    reminder_minutes:document.getElementById('new-reminder').value,
    note:document.getElementById('new-notes').value.trim(),
    add_to_calendar:document.getElementById('new-calendar').checked,
    contingent_on:conOn,
    contingent_delay:document.getElementById('new-contingent-delay').value,
    contingent_delay_unit:document.getElementById('new-contingent-unit').value
  };
  if (editingTaskId) payload.task_id=editingTaskId;
  closeModal();
  document.getElementById('sync-msg').textContent=editingTaskId?'Saving changes...':'Saving task...';
  callSheet(payload).then(function(r){
    if (r.success){document.getElementById('sync-msg').textContent='Reloading...';loadAll();}
    else{document.getElementById('sync-msg').textContent='Error saving task';}
  });
}

loadAll();
</script>
